<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Propuesta Comercial - Agroconsulta a Olivaterra</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Forzamos el tamaño A4 exacto y reducimos márgenes del navegador al mínimo */
        @page {
            size: A4;
            margin: 10mm;
        }
        @media print {
            body { 
                background-color: white !important; 
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            /* Ocultamos cualquier desbordamiento para asegurar 1 página */
            html, body {
                height: 100%;
                overflow: hidden;
            }
        }
    </style>
</head>
<body class="bg-gray-200">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const FileText = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><line x1="10" y1="9" x2="8" y2="9"></line></svg>;
        const Download = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>;
        const CheckCircle = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className || "text-emerald-600 mt-0.5 flex-shrink-0"}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>;

        function App() {
          const [proposalData] = useState({
            logos: {
              // PEGA EL LINK DE TUS IMÁGENES ENTRE LAS COMILLAS (ej: "https://midominio.com/logo.png")
              agroconsulta: "", 
              masVos: "",       
              bahco: "",        
              olivaterra: ""    
            },
            client: {
              name: "Olivaterra",
              contact: "Atte: Sector compras",
              address: "",
              email: ""
            },
            details: {
              title: "OPTIMIZACIÓN DE PODA ESTRUCTURAL",
              campaign: "Campaña 2026",
              quoteNumber: "COT-2026-0044",
              date: new Date().toLocaleDateString('es-AR'),
              validity: "Sujeta a stock",
            },
            products: [
              {
                id: 1,
                name: "Tijera Bahco BCL23 (35mm)",
                description: "Tijera eléctrica a batería. Capacidad de corte hasta 35 mm. Código: 016001000115393.",
                quantity: 1, // Solicitado: 1 de cada una
                unitPrice: 2125221.28 // Precio original ($1.848.018,50) + 15%
              },
              {
                id: 2,
                name: "Tijera Bahco BCL24 (45mm)",
                description: "Tijera eléctrica a batería. Capacidad de corte hasta 45 mm. Código: 016001000115407.",
                quantity: 1, // Solicitado: 1 de cada una
                unitPrice: 2793740.86 // Precio original ($2.429.339,88) + 15%
              }
            ],
            taxRate: 0.21,
            discountRate: 0.05 // 5% de descuento para el cliente
          });

          const formatCurrency = (amount) => {
            return new Intl.NumberFormat('es-AR', {
              style: 'currency',
              currency: 'ARS',
              minimumFractionDigits: 2
            }).format(amount);
          };

          const handleImageUpload = (key, e) => {
            const file = e.target.files[0];
            if (file) {
              const reader = new FileReader();
              reader.onload = (event) => {
                setProposalData(prev => ({
                  ...prev,
                  logos: {
                    ...prev.logos,
                    [key]: event.target.result // Guarda la imagen subida en la memoria de la página
                  }
                }));
              };
              reader.readAsDataURL(file);
            }
          };

          const handleDownloadPDF = () => {
            window.print();
          };

          return (
            <div className="min-h-screen bg-gray-200 py-8 print:py-0 print:bg-white flex justify-center font-sans text-gray-800">
              <div className="w-full max-w-4xl bg-white shadow-2xl rounded-lg overflow-hidden print:shadow-none print:rounded-none">
                
                {/* Botón de descarga (Oculto al imprimir) */}
                <div className="bg-emerald-800 text-white p-4 flex justify-between items-center print:hidden rounded-t-lg">
                  <div className="flex items-center gap-2">
                    <FileText />
                    <h1 className="font-semibold text-lg">Editor de Propuesta</h1>
                  </div>
                  <button 
                    onClick={handleDownloadPDF}
                    className="flex items-center gap-2 bg-emerald-600 hover:bg-emerald-500 text-white px-5 py-2 rounded-md transition-colors font-semibold shadow-md"
                  >
                    <Download />
                    Descargar PDF
                  </button>
                </div>

                {}
                <div className="bg-gray-100 p-4 border-b border-gray-300 print:hidden flex flex-wrap gap-4 items-center justify-center">
                  <p className="w-full text-center text-sm text-gray-700 font-bold mb-1">Panel de Control: Sube los logos desde tu computadora (No saldrá en el PDF)</p>
                  
                  {Object.keys(proposalData.logos).map((key) => {
                    const labels = {
                      agroconsulta: "Agroconsulta",
                      masVos: "+VOS",
                      bahco: "Bahco",
                      olivaterra: "Olivaterra"
                    };
                    return (
                      <div key={key} className="flex flex-col items-center">
                        <label className="cursor-pointer bg-white border border-gray-300 shadow-sm px-4 py-2 rounded-md text-xs font-bold text-emerald-800 hover:bg-emerald-50 transition">
                          ↑ Cargar Logo {labels[key]}
                          <input 
                            type="file" 
                            accept="image/*" 
                            className="hidden" 
                            onChange={(e) => handleImageUpload(key, e)} 
                          />
                        </label>
                      </div>
                    );
                  })}
                </div>

                {/* --- CONTENIDO PRINCIPAL COMPACTADO PARA A4 --- */}
                <div className="p-8 sm:p-12 print:p-4 print:m-0 print:text-[11px] leading-snug">
                  
                  {/* CABECERA CON ESPACIOS PARA 4 LOGOS */}
                  <div className="flex justify-between items-center border-b-2 border-emerald-700 pb-3 mb-4 print:pb-2 print:mb-3">
                    
                    <div className="flex items-center gap-3 print:gap-2 w-3/4">
                      
                      {/* ESPACIO LOGO 1: Agroconsulta */}
                      <div className="w-20 h-12 bg-emerald-900 border-2 border-emerald-900 flex items-center justify-center rounded relative overflow-hidden print:bg-emerald-900 print:border-emerald-900">
                        {proposalData.logos.agroconsulta ? (
                          <img src={proposalData.logos.agroconsulta} className="w-full h-full object-contain relative z-10" />
                        ) : (
                          <span className="absolute text-[8px] text-white font-bold uppercase text-center leading-tight print:hidden">Agroconsulta<br/>(Blanco)</span>
                        )}
                      </div>

                      {/* ESPACIO LOGO 2: +VOS */}
                      <div className="w-20 h-12 bg-slate-800 border-2 border-slate-800 flex items-center justify-center rounded relative overflow-hidden print:bg-slate-800 print:border-slate-800">
                        {proposalData.logos.masVos ? (
                          <img src={proposalData.logos.masVos} className="w-full h-full object-contain relative z-10" />
                        ) : (
                          <span className="absolute text-[8px] text-white font-bold uppercase text-center leading-tight print:hidden">+VOS<br/>(Blanco)</span>
                        )}
                      </div>

                      {/* ESPACIO LOGO 3: Bahco */}
                      <div className="w-20 h-12 bg-white border-2 border-dashed border-gray-300 flex items-center justify-center rounded relative overflow-hidden print:bg-white print:border-solid print:border-gray-200">
                        {proposalData.logos.bahco ? (
                          <img src={proposalData.logos.bahco} className="w-full h-full object-contain relative z-10" />
                        ) : (
                          <span className="absolute text-[8px] text-orange-500 font-bold uppercase text-center leading-tight print:hidden">Bahco<br/>(Naranja)</span>
                        )}
                      </div>

                      {/* ESPACIO LOGO 4: Olivaterra */}
                      <div className="w-20 h-12 bg-white border-2 border-dashed border-gray-300 flex items-center justify-center rounded relative overflow-hidden print:bg-white print:border-solid print:border-gray-200">
                        {proposalData.logos.olivaterra ? (
                          <img src={proposalData.logos.olivaterra} className="w-full h-full object-contain relative z-10" />
                        ) : (
                          <span className="absolute text-[8px] text-blue-600 font-bold uppercase text-center leading-tight print:hidden">Olivaterra<br/>(Azul)</span>
                        )}
                      </div>

                    </div>

                    <div className="text-right w-1/4">
                      <h1 className="text-2xl font-light text-emerald-800/40 mb-0.5 uppercase tracking-widest print:text-xl">Propuesta</h1>
                      <p className="text-sm font-bold text-emerald-900 print:text-[11px]">{proposalData.details.quoteNumber}</p>
                      <p className="text-xs text-gray-600 print:text-[10px]">Fecha: {proposalData.details.date}</p>
                    </div>
                  </div>

                  {}
                  <div className="text-center mb-4 print:mb-3">
                    <h2 className="text-xl font-bold text-gray-900 print:text-lg">{proposalData.details.title}</h2>
                    <h3 className="text-base text-emerald-700 font-medium print:text-sm">{proposalData.details.campaign}</h3>
                  </div>

                  <div className="mb-5 bg-slate-50 p-3 rounded-lg print:bg-transparent print:border print:p-2 print:mb-4 print:border-gray-200">
                    <h3 className="text-[10px] font-bold uppercase text-emerald-600 mb-0.5 tracking-wider print:text-[9px]">Preparado para:</h3>
                    <p className="text-lg font-bold text-gray-900 print:text-base">{proposalData.client.name}</p>
                    <p className="text-xs text-gray-700 font-medium print:text-[10px]">{proposalData.client.contact}</p>
                  </div>

                  <div className="mb-5 grid grid-cols-1 md:grid-cols-2 gap-4 print:mb-4 print:gap-3">
                    {/* Columna Izquierda: Estrategia */}
                    <div>
                      <h4 className="font-bold text-emerald-800 uppercase mb-1.5 border-b border-emerald-100 pb-0.5 text-xs print:text-[10px]">1. Enfoque Estratégico y Comunidad +VOS</h4>
                      <p className="text-gray-700 text-justify mb-1.5 text-xs print:text-[10px] print:leading-tight">
                        A partir de esta iniciativa, invitamos a <strong>{proposalData.client.name}</strong> a integrarse a la <strong>comunidad +VOS</strong> (Sinergia entre insumos y servicios), un espacio impulsado por Agroconsulta orientado a fortalecer la cadena de valor agrícola articulando innovación productiva.
                      </p>
                      <p className="text-gray-700 text-justify mb-1.5 text-xs print:text-[10px] print:leading-tight">
                        La incorporación de tecnología eléctrica profesional representa una inversión estratégica que impacta en tres dimensiones clave:
                      </p>
                      <ul className="list-disc list-inside space-y-0.5 text-gray-700 ml-1 text-xs print:text-[10px] print:leading-tight">
                        <li><strong>Productividad:</strong> mayor eficiencia operativa y velocidad.</li>
                        <li><strong>Calidad técnica:</strong> cortes más precisos y uniformes.</li>
                        <li><strong>Impacto social:</strong> mejora en condiciones laborales del equipo.</li>
                      </ul>
                    </div>

                    {/* Columna Derecha: Beneficios (Naranja) */}
                    <div className="bg-orange-50 border border-orange-200 p-3 rounded-xl print:shadow-none print:border-orange-300 print:p-2.5">
                      <h4 className="font-bold text-orange-800 uppercase mb-1.5 border-b border-orange-200 pb-0.5 text-xs print:text-[10px]">2. Acompañamiento y Beneficios</h4>
                      
                      <div className="bg-orange-100/80 border border-orange-200 p-1.5 rounded-lg mb-2 flex items-start gap-1.5 print:p-1 print:mb-1.5">
                        <CheckCircle className="text-orange-600 mt-0.5 flex-shrink-0" />
                        <p className="text-orange-900 text-[10px] font-medium leading-tight print:text-[9.5px]">
                          Al ser <strong>oficiales de Bahco</strong>, aseguramos respaldo técnico directo, trazabilidad en cada equipo y logística garantizada.
                        </p>
                      </div>

                      <p className="text-gray-800 text-justify mb-1.5 text-xs print:text-[10px] print:leading-tight">
                        Agroconsulta acompañará la implementación enfocándose en: <strong className="text-orange-900">uso correcto, buenas prácticas y mantenimiento preventivo.</strong>
                      </p>
                      <ul className="space-y-1 text-gray-800 text-[11px] print:text-[10px] print:leading-tight">
                        <li className="flex items-start gap-1">
                          <CheckCircle className="text-orange-500 mt-0.5 flex-shrink-0" />
                          <span>Condiciones preferenciales y descuentos en repuestos.</span>
                        </li>
                        <li className="flex items-start gap-1">
                          <CheckCircle className="text-orange-500 mt-0.5 flex-shrink-0" />
                          <span>Servicio de revisión previo a temporada.</span>
                        </li>
                      </ul>
                    </div>
                  </div>

                  {}
                  <div className="mb-5 print:mb-4">
                    <h4 className="font-bold text-emerald-800 uppercase mb-2 border-b border-emerald-100 pb-0.5 text-xs print:text-[10px]">3. Opciones de Equipos a Cotizar</h4>
                    
                    <div className="flex flex-col gap-4 print:gap-3">
                      {/* Bucle que separa cada producto en su propio cuadro */}
                      {proposalData.products.map((product) => {
                        const sub = product.quantity * product.unitPrice;
                        const disc = sub * proposalData.discountRate;
                        const net = sub - disc;
                        const tax = net * proposalData.taxRate;
                        const tot = net + tax;

                        return (
                          <div key={product.id} className="border border-emerald-200 rounded-lg overflow-hidden bg-white print:border-gray-300 break-inside-avoid shadow-sm print:shadow-none">
                            <div className="bg-emerald-50 px-3 py-1.5 border-b border-emerald-100 print:bg-gray-50 print:border-gray-200">
                              <h5 className="font-bold text-emerald-900 text-sm print:text-[11px] uppercase">{product.name}</h5>
                            </div>
                            <div className="p-3 print:p-2 flex flex-col sm:flex-row gap-4 print:gap-2">
                              {/* Descripción de esta opción */}
                              <div className="w-full sm:w-1/2">
                                <p className="text-xs text-gray-700 print:text-[10px] leading-snug mb-2">{product.description}</p>
                                <p className="text-xs text-gray-800 print:text-[10px] mb-0.5"><strong>Cantidad propuesta:</strong> {product.quantity} unidad</p>
                                <p className="text-xs text-gray-800 print:text-[10px]"><strong>Precio Unit. Lista:</strong> {formatCurrency(product.unitPrice)}</p>
                              </div>
                              {/* Cálculo financiero de esta opción */}
                              <div className="w-full sm:w-1/2 bg-gray-50 p-2.5 rounded border border-gray-100 print:bg-transparent print:border-none print:p-0">
                                <div className="flex justify-between py-1 text-[11px] text-gray-600 print:text-[10px]">
                                  <span>Subtotal</span>
                                  <span>{formatCurrency(sub)}</span>
                                </div>
                                <div className="flex justify-between py-1 text-[11px] text-emerald-600 font-medium border-b border-gray-200 pb-1 print:text-[10px]">
                                  <span>Bonificación ({(proposalData.discountRate * 100).toFixed(0)}%)</span>
                                  <span>- {formatCurrency(disc)}</span>
                                </div>
                                <div className="flex justify-between py-1 text-[11px] text-gray-600 mt-0.5 print:text-[10px]">
                                  <span>Neto Gravado</span>
                                  <span>{formatCurrency(net)}</span>
                                </div>
                                <div className="flex justify-between py-1 text-[11px] text-gray-600 print:text-[10px]">
                                  <span>IVA ({(proposalData.taxRate * 100).toFixed(1)}%)</span>
                                  <span>{formatCurrency(tax)}</span>
                                </div>
                                <div className="flex justify-between items-center mt-1 pt-1.5 border-t border-emerald-200">
                                  <span className="text-xs font-black text-emerald-900 uppercase print:text-[10.5px]">Total Opción</span>
                                  <span className="text-sm font-black text-emerald-900 print:text-xs">{formatCurrency(tot)}</span>
                                </div>
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>

                  {}
                  <div className="bg-slate-50 p-3 rounded-lg border border-slate-200 w-full mb-4 print:border-gray-200 print:bg-transparent print:p-2.5">
                      <h4 className="font-bold text-gray-800 mb-1.5 uppercase text-[10px] tracking-wider print:text-[9px]">Condiciones de Pago</h4>
                      <ul className="text-xs text-gray-700 space-y-1 print:text-[10px] flex flex-col sm:flex-row sm:gap-12">
                        <li><span className="font-semibold text-gray-900">Medio de pago:</span> Cheque electrónico (eCheq).</li>
                        <li><span className="font-semibold text-gray-900">Plazos acordados:</span> 0 - 30 - 60 - 90 - 120 días.</li>
                      </ul>
                  </div>

                  <div className="border-t border-gray-200 pt-3 mt-3 text-[10px] text-gray-500 print:text-[9px] print:pt-2 print:mt-2">
                    <h4 className="font-bold text-gray-700 mb-1 uppercase tracking-wider print:text-[8.5px]">Condiciones Generales</h4>
                    <ul className="list-disc list-inside space-y-0.5 columns-1 sm:columns-2">
                      <li>Valores expresados en pesos argentinos (ARS), más IVA.</li>
                      <li>Oferta sujeta a disponibilidad de stock al confirmar.</li>
                      <li>La confirmación permite coordinar entrega y puesta en marcha.</li>
                      <li><strong>Incluye:</strong> Acompañamiento técnico y capacitación.</li>
                    </ul>
                    <p className="mt-3 text-center italic font-medium text-emerald-800/80 print:mt-2">
                      "Desde Agroconsulta entendemos que la tecnología genera confianza, y la sostenibilidad construye valor en el tiempo. Este proyecto busca integrar ambas dimensiones para fortalecer el desarrollo productivo de la región."
                    </p>
                  </div>

                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
